<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ceralo</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app" id="app">
      <section id="empty-state" class="empty-state" hidden>
        <div class="empty-mark" id="empty-mark"></div>
        <h1 class="empty-title">No document open</h1>
        <p class="empty-subtitle">
          Open a PDF to fill forms, add text, and sign. Your file stays on this device.
        </p>
        <button id="empty-open" class="btn btn-primary" type="button">Open PDF…</button>
      </section>

      <div id="viewer" class="viewer" hidden></div>
    </main>

    <div id="loading" class="loading" role="status" aria-live="polite" hidden>
      <span class="spinner" aria-hidden="true"></span>
      <span>Opening…</span>
    </div>

    <!-- The dock (nav role=toolbar) is built and mounted by main.ts. -->
    <div id="toasts"></div>

    <div id="search-bar" class="search-bar" role="search" hidden>
      <span class="search-icon" id="search-icon" aria-hidden="true"></span>
      <input
        id="search-input"
        class="search-input"
        type="text"
        placeholder="Find in document"
        aria-label="Find in document"
        autocomplete="off"
      />
      <span id="search-count" class="search-count" aria-live="polite"></span>
      <button id="search-prev" class="btn-icon" type="button" aria-label="Previous match"></button>
      <button id="search-next" class="btn-icon" type="button" aria-label="Next match"></button>
      <button id="search-close" class="btn-icon" type="button" aria-label="Close find"></button>
    </div>

    <dialog id="password-dialog" class="password-dialog" aria-label="Enter PDF password">
      <form method="dialog" class="password-form">
        <h2 class="password-title">Password required</h2>
        <p id="password-message" class="password-message"></p>
        <input
          id="password-input"
          type="password"
          class="password-input"
          aria-label="PDF password"
          autocomplete="off"
        />
        <div class="password-actions">
          <button class="btn btn-ghost" value="cancel" type="submit">Cancel</button>
          <button id="password-ok" class="btn btn-primary" value="ok" type="submit">Open</button>
        </div>
      </form>
    </dialog>

    <dialog id="signature-dialog" class="signature-dialog" aria-label="Draw your signature">
      <h2 class="signature-title">Draw your signature</h2>
      <div
        id="saved-signatures"
        class="saved-signatures"
        role="group"
        aria-label="Saved signatures"
        hidden
      ></div>
      <div id="signature-pad-host" class="signature-pad-host"></div>
      <div class="signature-actions">
        <label class="signature-save-toggle">
          <input id="signature-save" type="checkbox" />
          Save for reuse
        </label>
        <button id="signature-import" class="btn btn-ghost" type="button">Import image…</button>
        <button id="signature-clear" class="btn btn-ghost" type="button">Clear</button>
        <button id="signature-cancel" class="btn btn-ghost" type="button">Cancel</button>
        <button id="signature-use" class="btn btn-success" type="button">Place signature</button>
      </div>
    </dialog>

    <dialog id="confirm-dialog" class="confirm-dialog" aria-labelledby="confirm-title">
      <form method="dialog" class="confirm-form">
        <h2 id="confirm-title" class="confirm-title">Unsaved changes</h2>
        <p id="confirm-message" class="confirm-message"></p>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="btn btn-ghost" value="cancel" type="submit">
            Cancel
          </button>
          <button id="confirm-ok" class="btn btn-primary" value="ok" type="submit">
            Close without saving
          </button>
        </div>
      </form>
    </dialog>
  </body>
</html>
