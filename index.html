<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignetPDF</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app" id="app">
      <header class="toolbar">
        <h1>SignetPDF</h1>
        <div class="toolbar-actions">
          <button id="open" type="button">Open PDF…</button>
          <button id="save" type="button">Save</button>
          <button id="save-as" type="button">Save As…</button>
          <button id="export-flat" type="button">Export flat…</button>
          <button id="text-tool" type="button" aria-pressed="false">Text</button>
          <button id="sign-tool" type="button">Sign</button>
          <button id="undo" type="button" disabled>Undo</button>
          <button id="redo" type="button" disabled>Redo</button>
          <div class="zoom" role="group" aria-label="Zoom">
            <button id="zoom-out" type="button" aria-label="Zoom out">−</button>
            <span id="zoom-level" aria-live="polite">125%</span>
            <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
            <button id="zoom-fit" type="button">Fit width</button>
          </div>
        </div>
      </header>
      <p id="status" class="status" role="alert"></p>
      <div id="viewer" class="viewer">Loading…</div>
    </main>

    <dialog id="signature-dialog" class="signature-dialog" aria-label="Draw your signature">
      <h2 class="signature-title">Draw your signature</h2>
      <div id="signature-pad-host" class="signature-pad-host"></div>
      <div class="signature-actions">
        <button id="signature-import" type="button">Import image…</button>
        <button id="signature-clear" type="button">Clear</button>
        <button id="signature-cancel" type="button">Cancel</button>
        <button id="signature-use" type="button">Place signature</button>
      </div>
    </dialog>
  </body>
</html>
