name: Release

# Build installable artefacts for Linux, macOS and Windows when a version tag is
# pushed, and attach them to a draft GitHub release for review before publishing
# (see RELEASING.md). The macOS build is universal (Intel + Apple Silicon).
# Binaries are unsigned and unnotarized — Gatekeeper/SmartScreen will warn (see
# KNOWN_ISSUES.md); signing and notarization are tracked separately.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ""
          # macos-latest runners are Apple Silicon; build a universal binary so
          # the .dmg/.app also runs on Intel Macs.
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: windows-latest
            args: ""

    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install node and rust from mise.toml
        uses: jdx/mise-action@v4

      - name: Add macOS universal build targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and bundle, attach to a draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SignetPDF ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # Bundle targets default to the bundle config (targets: "all") per OS.
