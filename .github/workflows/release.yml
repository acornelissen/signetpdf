name: Release

# Build installable artefacts for Linux, macOS and Windows when a version tag is
# pushed, and attach them to a draft GitHub release for review before publishing
# (see RELEASING.md). The macOS build is universal (Intel + Apple Silicon).
#
# macOS is signed with a Developer ID Application certificate and notarized with
# an App Store Connect API key when the signing secrets are present; without them
# the build still runs but produces an unsigned bundle. Windows is still unsigned
# (SmartScreen warns; tracked separately). See KNOWN_ISSUES.md.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ""
          # macos-latest runners are Apple Silicon; build a universal binary so
          # the .dmg/.app also runs on Intel Macs.
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: windows-latest
            args: ""

    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install node and rust from mise.toml
        uses: jdx/mise-action@v4

      - name: Add macOS universal build targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Materialise the App Store Connect API key (.p8) for notarization. The
      # bundler wants a file path, so decode the base64 secret to a temp file.
      # A no-op (empty file) when the secret is unset; the build then stays
      # unsigned/un-notarized rather than failing.
      - name: Write the App Store Connect API key (macOS)
        if: matrix.os == 'macos-latest'
        run: echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/apple-api-key.p8"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Build and bundle, attach to a draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Developer ID Application). Empty on Linux/Windows
          # and when the secrets are unset, in which case the bundle is unsigned.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization via an App Store Connect API key. APPLE_API_KEY is
          # the Key ID; APPLE_API_KEY_PATH is the .p8 written in the step above.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api-key.p8
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ceralo ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # Bundle targets default to the bundle config (targets: "all") per OS.
