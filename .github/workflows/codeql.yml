name: CodeQL

# Static security analysis for the TypeScript frontend and the Rust backend.
# Runs on pushes/PRs to master and weekly. Findings appear under Security →
# Code scanning. Advisory only — it does not gate merges.
#
# Both languages use build-mode "none" (buildless extraction): the Rust
# extractor does not support autobuild, and neither needs a compiled build.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "27 3 * * 1" # Mondays, 03:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, rust]

    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
