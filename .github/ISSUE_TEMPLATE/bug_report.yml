name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security issues, do **not** file here — see
        [SECURITY.md](https://github.com/acornelissen/signetpdf/blob/master/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, expected vs actual behaviour.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SignetPDF version
      placeholder: e.g. 0.4.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: pdf
    attributes:
      label: PDF details (optional)
      description: >
        If a specific PDF triggers it, describe it (forms? rotated pages?
        encrypted? large?). Please do not attach confidential documents.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots (optional)
      description: Any error text, console output, or screenshots.
