name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: How might it work? Alternatives you've considered?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits a minimal, local-only PDF app (no accounts, cloud, or telemetry).
          required: false
